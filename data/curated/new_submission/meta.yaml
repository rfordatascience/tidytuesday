- file: "penguin_mosaic.jpg"
  alt: >
    A montage of the 18 penguin species included in the data set, arranged alphabetically from A. forsteri (top left) to S. mendiculus (bottom right). The images vary; most show a single individual in a terrestrial habitat, but some show multiple individuals or family groups, or show birds at sea.
- file: "gg_penguin_phylo.png"
  alt: >
    A phylogenetic layout of images of the 18 penguin species included in the data set, arranged according to a radial phylogenetic layout. The images vary; most show a single individual in a terrestrial habitat, but some show multiple individuals or family groups, or show birds at sea.
