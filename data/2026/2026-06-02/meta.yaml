- file: "chart.png"
  alt: >
    An area chart with lines showing changes in average parenting leave regulations across 21 European countries between 1970 and 2024. A general increase in total paid leave is seen until around 1990 where it then flattens out. However, after 1990 an increasing proportion of the leave is protected leave for co-parents. Total protected leave increased until around 2000 before flattening off.
