- file: "sample_plot.png"
  alt: >
    A shaded area chart titled 'Wind Power Consumed by Population and Industry (%)' comparing wind energy consumption in Denmark, Ireland, and Norway from 1990 to 2010. The visualization uses an overlapping 'identity' position to show each country’s individual trajectory. Denmark (teal) shows an early and aggressive lead, peaking near 4% by 2010, while Ireland (light blue) demonstrates a significant surge starting around 2003. Norway (burnt orange) shows a more modest, steady climb that begins to level out after 2007. The plot illustrates the 'momentum' of the energy transition, inviting participants to explore similar shifts in renewables, energy access, and efficiency metrics across the full global dataset.
